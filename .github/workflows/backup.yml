name: Daily Backup

on:
  schedule:
    # Setiap hari jam 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Trigger backup via SSH ke server cihuy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CIHUY_HOST }}
          username: ${{ secrets.CIHUY_USER }}
          key: ${{ secrets.CIHUY_SSH_KEY }}
          script: |
            cd /var/www/wa-autoreply-bot
            docker compose -f docker-compose.prod.yml exec -T dashboard php artisan backup:run --type=db
            docker compose -f docker-compose.prod.yml exec -T dashboard php artisan backup:run --type=session
