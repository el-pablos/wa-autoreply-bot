name: CI — Test, Lint, Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-dashboard:
    name: Lint Laravel (Pint)
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('dashboard/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Jalankan Pint (--test mode)
        run: ./vendor/bin/pint --test

  lint-bot:
    name: Lint Bot JS
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Jalankan lint (jika tersedia)
        run: |
          if npm run | grep -q "^  lint"; then
            npm run lint
          else
            echo "Skip lint: tidak ada script 'lint' di package.json"
          fi

  test-bot:
    name: Unit Test Bot (Jest)
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    needs: lint-bot
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Jalankan unit test dengan coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-coverage
          path: bot/coverage/
          retention-days: 14

  test-dashboard:
    name: Feature & Unit Test Dashboard (PHPUnit)
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    needs: lint-dashboard
    defaults:
      run:
        working-directory: dashboard
    env:
      COMPOSER_ALLOW_SUPERUSER: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, sqlite3, mbstring, zip, gd, redis
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('dashboard/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: |
          mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs storage/app/public
          chmod -R 775 bootstrap storage
          composer install --no-interaction --prefer-dist --no-progress

      - name: Setup env untuk testing
        run: |
          cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          php artisan key:generate --force

      - name: Jalankan semua test dengan coverage
        run: php artisan test --coverage --min=0

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: dashboard/coverage/
          retention-days: 14

  build-docker:
    name: Build Docker Images (smoke)
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    needs: [test-bot, test-dashboard]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Bot image
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: false
          tags: wa-bot:ci
          cache-from: type=gha,scope=bot-ci
          cache-to: type=gha,mode=max,scope=bot-ci

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: false
          tags: wa-dashboard:ci
          cache-from: type=gha,scope=dashboard-ci
          cache-to: type=gha,mode=max,scope=dashboard-ci

      - name: Smoke test bot health endpoint
        run: |
          CONTAINER_NAME="ci-bot-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker run -d --name "$CONTAINER_NAME" -e DB_HOST=localhost -e DB_PASSWORD=test -p 0:3001 wa-bot:ci
          HOST_PORT=$(docker port "$CONTAINER_NAME" 3001/tcp | awk -F: '{print $2}')
          sleep 10
          curl -f "http://localhost:${HOST_PORT}/health" || echo "Bot health check warning (DB tidak tersedia di smoke test, expected)"
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
