<!doctype html>
<html lang="id" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kamu offline — WA Bot</title>
        <style>
            /* ── Design tokens Paper Editorial ── */
            :root {
                --paper: #f6f3ec;
                --paper-dark: #ede9df;
                --ink: #1a1a1a;
                --ink-muted: #5a5a5a;
                --ink-faint: #9a9a8a;
                --accent: #2d6a4f;
                --shadow-hard: 4px 4px 0 #1a1a1a;
                --font-serif:
                    Georgia, "Times New Roman", "Playfair Display", serif;
                --font-sans: "Inter", system-ui, -apple-system, sans-serif;
                --radius: 2px;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
            }

            body {
                background-color: var(--paper);
                color: var(--ink);
                font-family: var(--font-sans);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 1.5rem;
                /* Subtle paper texture via repeating gradient */
                background-image: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    rgba(26, 26, 26, 0.04) 31px,
                    rgba(26, 26, 26, 0.04) 32px
                );
            }

            /* ── Card ── */
            .card {
                background-color: var(--paper-dark);
                border: 1.5px solid var(--ink);
                box-shadow: var(--shadow-hard);
                border-radius: var(--radius);
                padding: 2.5rem 2rem 2rem;
                max-width: 480px;
                width: 100%;
                position: relative;
            }

            /* ── Kop surat: masthead ── */
            .masthead {
                border-bottom: 2px solid var(--ink);
                padding-bottom: 1rem;
                margin-bottom: 1.75rem;
                display: flex;
                align-items: baseline;
                gap: 0.75rem;
            }

            .masthead-logo {
                font-family: var(--font-serif);
                font-size: 1.5rem;
                font-weight: 700;
                letter-spacing: -0.02em;
                color: var(--ink);
                line-height: 1;
            }

            .masthead-tagline {
                font-size: 0.6875rem;
                font-weight: 500;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--ink-muted);
            }

            /* ── Icon offline ── */
            .icon-wrap {
                display: flex;
                justify-content: center;
                margin-bottom: 1.5rem;
            }

            .icon-offline {
                width: 56px;
                height: 56px;
                border: 1.5px solid var(--ink);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 2px 2px 0 var(--ink);
                background: var(--paper);
            }

            .icon-offline svg {
                width: 28px;
                height: 28px;
                stroke: var(--ink);
                fill: none;
                stroke-width: 1.75;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            /* ── Headline ── */
            .headline {
                font-family: var(--font-serif);
                font-size: 2rem;
                font-weight: 700;
                letter-spacing: -0.03em;
                line-height: 1.15;
                color: var(--ink);
                text-align: center;
                margin-bottom: 0.875rem;
            }

            /* ── Subline ── */
            .subline {
                font-family: var(--font-serif);
                font-size: 1rem;
                font-style: italic;
                color: var(--ink-muted);
                text-align: center;
                line-height: 1.6;
                margin-bottom: 0.5rem;
            }

            /* ── Body copy ── */
            .body-copy {
                font-size: 0.875rem;
                color: var(--ink-muted);
                text-align: center;
                line-height: 1.65;
                margin-bottom: 2rem;
            }

            /* ── Divider ── */
            .divider {
                border: none;
                border-top: 1px solid var(--ink-faint);
                margin: 1.5rem 0;
            }

            /* ── Button ── */
            .btn-retry {
                display: block;
                width: 100%;
                padding: 0.75rem 1.5rem;
                background: var(--ink);
                color: var(--paper);
                font-family: var(--font-sans);
                font-size: 0.8125rem;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                border: 1.5px solid var(--ink);
                border-radius: var(--radius);
                cursor: pointer;
                box-shadow: 2px 2px 0 var(--ink-muted);
                transition:
                    transform 0.1s ease,
                    box-shadow 0.1s ease;
                text-align: center;
                text-decoration: none;
            }

            .btn-retry:hover {
                transform: translate(-1px, -1px);
                box-shadow: 3px 3px 0 var(--ink-muted);
            }

            .btn-retry:active {
                transform: translate(1px, 1px);
                box-shadow: 1px 1px 0 var(--ink-muted);
            }

            /* ── Footer kop ── */
            .card-footer {
                margin-top: 1.5rem;
                padding-top: 1rem;
                border-top: 1px solid var(--ink-faint);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.5rem;
            }

            .footer-date {
                font-size: 0.6875rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--ink-faint);
            }

            .footer-status {
                display: flex;
                align-items: center;
                gap: 0.375rem;
                font-size: 0.6875rem;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--ink-faint);
            }

            .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--ink-faint);
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* ── Responsive ── */
            @media (max-width: 480px) {
                .card {
                    padding: 2rem 1.25rem 1.5rem;
                }
                .headline {
                    font-size: 1.625rem;
                }
            }
        </style>
    </head>
    <body>
        <article class="card" role="main">
            <!-- Masthead -->
            <header class="masthead">
                <span class="masthead-logo">WA Bot</span>
                <span class="masthead-tagline">Operator Console</span>
            </header>

            <!-- Icon -->
            <div class="icon-wrap" aria-hidden="true">
                <div class="icon-offline">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <!-- WiFi off icon -->
                        <line x1="1" y1="1" x2="23" y2="23" />
                        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
                        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
                        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
                        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                        <circle
                            cx="12"
                            cy="20"
                            r="1"
                            fill="currentColor"
                            stroke="none"
                        />
                    </svg>
                </div>
            </div>

            <!-- Copy -->
            <h1 class="headline">Kamu offline.</h1>
            <p class="subline">Koneksi terputus saat ini.</p>

            <hr class="divider" />

            <p class="body-copy">
                Dashboard ini butuh koneksi. Kami akan otomatis<br />
                reconnect begitu internet kembali.
            </p>

            <!-- CTA -->
            <button
                class="btn-retry"
                onclick="window.location.reload()"
                type="button"
                aria-label="Coba reload halaman"
            >
                Coba lagi
            </button>

            <!-- Footer -->
            <footer class="card-footer">
                <span class="footer-date" id="offline-date"></span>
                <span class="footer-status">
                    <span
                        class="status-dot"
                        role="status"
                        aria-label="Menunggu koneksi"
                    ></span>
                    Menunggu koneksi
                </span>
            </footer>
        </article>

        <script>
            // Tampilkan tanggal sekarang di footer
            const dateEl = document.getElementById("offline-date");
            if (dateEl) {
                const now = new Date();
                const opts = { day: "numeric", month: "long", year: "numeric" };
                dateEl.textContent = now.toLocaleDateString("id-ID", opts);
            }

            // Auto-reload saat koneksi kembali
            window.addEventListener("online", () => {
                window.location.reload();
            });
        </script>
    </body>
</html>
